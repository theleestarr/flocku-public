; Flocku — Heltec Wireless Tracker production build only.
; https://heltec.org/project/wireless-tracker/

[platformio]
default_envs = heltec_wireless_tracker

[env:heltec_wireless_tracker]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
board_upload.flash_size = 8MB
build_src_filter = +<*> -<geo_math_host_main.cpp> -<demo_main.cpp> -<demo_input.cpp> -<demo_screens.cpp>
monitor_speed = 115200
upload_speed = 460800
board_build.filesystem = littlefs
board_build.partitions = partitions_tbeam_8mb.csv
build_flags =
	-DCORE_DEBUG_LEVEL=0
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DSSD1306_NO_SPLASH
	-DSIMULATION_MODE=0
	-DFLOCKU_BOARD_HELTEC_TRACKER
	-DFIRMWARE_VERSION_STRING=\"1.1.8\"
lib_deps =
	mikalhart/TinyGPSPlus @ ^1.1.0
	adafruit/Adafruit GFX Library @ ^1.11.9
	adafruit/Adafruit BusIO @ ^1.16.1
	adafruit/Adafruit NeoPixel @ ^1.12.0
	https://github.com/adafruit/Adafruit-ST7735-Library.git

[env:heltec_wireless_tracker_v1_0]
extends = env:heltec_wireless_tracker
build_flags =
	${env:heltec_wireless_tracker.build_flags}
	-DFLOCKU_HELTEC_TRACKER_V1_0
